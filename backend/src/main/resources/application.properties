# =============================================================
# APPLICATION CONFIGURATION
# =============================================================
# This file configures your Spring Boot application.
# For development, values can be hardcoded here.
# For production, use environment variables with ${VAR_NAME:default} syntax.
# =============================================================

# Application name (shows in logs and monitoring tools)
spring.application.name=chatbot-saas

# Server port — the backend runs at http://localhost:8080
server.port=8080


# =============================================================
# DATABASE CONFIGURATION (PostgreSQL)
# =============================================================
# HOW the connection URL works:
#   jdbc:postgresql://[host]:[port]/[database-name]
#   ${DB_HOST:localhost}  → use DB_HOST env variable, default to "localhost"
#   ${DB_PORT:5432}       → use DB_PORT env variable, default to "5432"
#   ${DB_NAME:chatbot_saas} → use DB_NAME env variable, default to "chatbot_saas"
# =============================================================

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatbot_saas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver


# =============================================================
# JPA / HIBERNATE CONFIGURATION
# =============================================================
# ddl-auto controls how Hibernate manages the database schema:
#   create        → drops and recreates tables on every startup (DANGEROUS in prod!)
#   create-drop   → creates tables on startup, drops on shutdown
#   update        → updates existing tables to match entities (GOOD for development)
#   validate      → validates schema but never changes it (SAFE for production)
#   none          → does nothing (you manage schema manually)
#
# For development, use "update".
# For production, use "validate" or manage schema with Flyway/Liquibase.
# =============================================================

spring.jpa.hibernate.ddl-auto=update

# Show SQL in the console (helpful for learning and debugging)
# Set to false in production to reduce log noise
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Explicitly set the database dialect so Hibernate generates correct SQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable open-in-view (best practice — prevents lazy loading issues)
# OSIV (Open Session In View) can cause N+1 query problems
spring.jpa.open-in-view=false


# =============================================================
# JWT CONFIGURATION
# =============================================================
# SECURITY WARNING:
#   The jwt.secret must be:
#   - At least 256 bits (32+ characters) for HS256 algorithm
#   - Base64 encoded
#   - NEVER hardcoded in production — use environment variables!
#
# To generate a secure secret:
#   openssl rand -base64 64
#
# The value below is safe for local development only.
# =============================================================

jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGNoYXRib3Qgc2Fhc...2hhdGJvdCBzYWFzIHBsYXRmb3JtIGp3dCBzZWNyZXQ=}

# Token expiration: 86400000ms = 24 hours
# After 24 hours, the user must log in again
jwt.expiration=${JWT_EXPIRATION:86400000}


# =============================================================
# PHASE 3: FILE UPLOAD
# =============================================================
# Where uploaded files (PDFs) are stored on disk.
# In production, replace this with S3 or cloud storage.
# The path is relative to where the app runs.
file.upload.dir=${FILE_UPLOAD_DIR:./uploads}

# Spring's built-in multipart (file upload) settings
# Max file size per upload
spring.servlet.multipart.max-file-size=20MB
# Max total request size (includes all fields + files)
spring.servlet.multipart.max-request-size=25MB


# =============================================================
# PHASE 3: QDRANT VECTOR DATABASE
# =============================================================
# Qdrant stores "embeddings" — numerical representations of text.
# When the user asks a question, we convert it to a vector,
# then search Qdrant for the closest matching document chunks.
#
# HOW Qdrant works (simplified):
#   Text → Embedding Model → [0.1, 0.3, -0.2, ...] (768 numbers for Ollama)
#   We store these number arrays in Qdrant.
#   To search: convert query to vector → find nearest stored vectors.
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6333}
# Name of the Qdrant collection (like a table in SQL)
qdrant.collection.name=chatbot_knowledge
# Dimension must match the embedding model:
#   nomic-embed-text (Ollama, FREE): 768 dims
#   text-embedding-3-small (OpenAI, paid): 1536 dims
# NOTE: if you change this after creating the collection, delete the collection first:
#   curl -X DELETE http://localhost:6333/collections/chatbot_knowledge
qdrant.vector.dimension=${QDRANT_VECTOR_DIMENSION:768}


# =============================================================
# PHASE 3: OPENAI EMBEDDING API (OPTIONAL — Ollama is used by default)
# =============================================================
# Leave blank — Ollama handles embeddings for free.
# Only set this if you want OpenAI embeddings AND change dimension to 1536.
openai.api.key=${OPENAI_API_KEY:}
openai.embedding.model=text-embedding-3-small


# =============================================================
# PHASE 4: OLLAMA (FREE LOCAL AI)
# =============================================================
# Ollama runs AI models on your own machine — completely free!
#
# SETUP (one time):
#   1. Download Ollama: https://ollama.com/download
#   2. Pull the models:
#        ollama pull llama3.2          ← chat model (2GB)
#        ollama pull nomic-embed-text  ← embedding model (274MB)
#   3. Ollama starts automatically — runs at http://localhost:11434
#
# HOW it works in our app:
#   User message → Ollama embed → Qdrant search → find relevant chunks
#   → Build prompt (system + context + history) → Ollama chat → response
#
# Popular models to try (run: ollama pull <model>):
#   llama3.2       — 3B params, fast, great quality (RECOMMENDED)
#   llama3.1       — 8B params, slower but smarter
#   mistral        — 7B params, great at following instructions
#   gemma2:2b      — 2B params, very fast, good for low-RAM machines
#   phi3.5         — 3.8B params, good quality, fast
# =============================================================

ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
# Chat model — what answers user questions
ollama.model=${OLLAMA_MODEL:llama3.2}
# Embedding model — converts text to vectors for similarity search
ollama.embedding.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

# Maximum conversation history to send to the AI (higher = more context but slower)
chat.history.max-messages=${CHAT_HISTORY_MAX:10}
# Maximum knowledge chunks to inject into the prompt
chat.rag.top-k=${CHAT_RAG_TOP_K:3}


# =============================================================
# LOGGING
# =============================================================
# Logging levels: TRACE < DEBUG < INFO < WARN < ERROR
# For development, DEBUG for our code, INFO for framework code
# =============================================================

logging.level.com.chatbot.saas=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
