# WHY this file exists:
#   React Router uses the browser's History API for URLs like /dashboard.
#   When a user refreshes /dashboard, the browser sends a real HTTP request.
#   nginx needs to return index.html for ALL routes (not just /).
#   React Router then reads the URL and renders the correct page.
#   Without this, refreshing any page except / would return a 404.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # All routes return index.html (React Router handles routing client-side)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets (JS, CSS, images) for 1 year
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
